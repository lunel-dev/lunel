name: check-all

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            cli/package-lock.json
            app/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CLI deps
        run: npm ci --prefix cli

      - name: Install app deps
        run: npm ci --prefix app

      - name: Install manager deps
        run: bun install --cwd manager --frozen-lockfile

      - name: Install proxy deps
        run: bun install --cwd proxy --frozen-lockfile

      - name: Run check-all
        run: npm run check:all
